name: Scheduled Model Training

on:
  schedule:
    - cron: '15 17 * * 1'  # Every Monday at 17:15 UTC
  workflow_dispatch:        # Manual trigger from Actions tab

# Fix 1: Grant write permission so the bot can push commits back to the repo
permissions:
  contents: write

jobs:
  train-and-save-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # Fix 2: persist-credentials ensures git push works with GITHUB_TOKEN
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model and save as .