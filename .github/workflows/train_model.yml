name: Scheduled Model Training

on:
  schedule:
    - cron: '45 17 * * 1'  # Every Monday at 17:45 UTC
  workflow_dispatch:        # Manual trigger from Actions tab

# Fix 1: Grant write permission so the bot can push commits back to the repo
permissions:
  contents: write

jobs:
  train-and-save-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        # Fix 2: persist-credentials ensures git push works with GITHUB_TOKEN
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model and save as .pkl
        run: |
          python baseline_daily_run.py

      - name: Verify model file exists
        run: |
          if [ ! -f gold_model.pkl ]; then
            echo "gold_model.pkl was not found! Training may have failed."
            exit 1
          else
            echo "gold_model.pkl successfully created."
          fi

      - name: Commit and push updated model
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add gold_model.pkl
          git diff --staged --quiet || git commit -m "chore: update gold_model.pkl from scheduled training [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}