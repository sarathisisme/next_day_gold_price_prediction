name: Scheduled Model Training

on:
  schedule:
    - cron: '0 6 * * *'  # Every day at 6:00 UTC (7:00 CET)
  workflow_dispatch:        # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  train-and-save-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model and save predictions
        run: |
          python daily_run.py

      - name: Verify predictions files exist
        run: |
          if [ ! -f gold_predictions.csv ]; then
            echo "gold_predictions.csv was not found! Training may have failed."
            exit 1
          else
            echo "gold_predictions.csv successfully created."
          fi

      - name: Commit and push updated predictions
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add gold_predictions.csv
          git diff --staged --quiet || git commit -m "chore: update predictions CSVs from scheduled training [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}