name: Scheduled Model Training

on:
  # Run on a schedule - currently set to every Monday at 00:00 UTC
  schedule:
    - cron: '15 17 * * 1'

  # Also allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  train-and-save-model:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Cache pip dependencies to speed up future runs
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install dependencies from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Run your training script
      # ⚠️ Replace 'train_model.py' with the actual name of your .py file
      - name: Train model and save as .pkl
        run: |
          python baseline_daily_run.py

      # Step 6: Verify the .pkl file was created
      # ⚠️ Replace 'model.pkl' with the actual name your script saves the model as
      - name: Verify model file exists
        run: |
          if [ ! -f gold_model.pkl ]; then
            echo "❌ gold_model.pkl was not found! Training may have failed."
            exit 1
          else
            echo "✅ gold_model.pkl successfully created."
          fi

      # Step 7: Commit and push the updated .pkl file back to the repo
      # This ensures Streamlit Community Cloud always has the latest model
      - name: Commit and push updated model
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add gold_model.pkl
          git diff --staged --quiet || git commit -m "chore: update model.pkl from scheduled training [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}